<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f2eb;
    background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.5' fill='%23000' fill-opacity='0.04'/%3E%3C/svg%3E");
    min-height: 100vh;
    padding: 40px 16px 60px;
    font-family: 'Special Elite', monospace;
    color: #1a1a1a;
  }

  .container { max-width: 560px; margin: 0 auto; }

  .reveal {
    opacity: 0;
    transform: translate3d(0, 32px, 0);
    transition: opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1), transform 0.75s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .reveal.is-visible {
    opacity: 1;
    transform: translate3d(0, 0, 0);
  }

  .header-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 26px;
    text-align: center;
    letter-spacing: 2px;
    color: #1a1a1a;
    margin-bottom: 28px;
  }

  .flyer-wrap {
    background: #fff;
    border: 2px solid #1a1a1a;
    padding: 8px;
    margin-bottom: 32px;
    position: relative;
  }
  .flyer-wrap::before {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid #1a1a1a;
    pointer-events: none;
  }
  .flyer-wrap img { width: 100%; display: block; filter: contrast(1.05); }

  /* Mismo fondo que body: el .reveal usa transform/opacity y rompe multiply si el img hereda otro “backdrop” */
  .bandeet-reveal {
    margin: 0 0 28px;
    background-color: #f5f2eb;
    background-image: url("data:image/svg+xml,%3Csvg width='4' height='4' viewBox='0 0 4 4' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='1' cy='1' r='0.5' fill='%23000' fill-opacity='0.04'/%3E%3C/svg%3E");
  }
  .bandeet-wrap {
    text-align: center;
    margin: 0;
  }
  /* --bandeet-color: 0 = logo en escala de grises; 1 = color real (lo mueve el scroll) */
  .bandeet-img {
    --bandeet-color: 0;
    width: 100%;
    max-width: min(520px, 100%);
    height: auto;
    display: inline-block;
    vertical-align: middle;
    mix-blend-mode: multiply;
    will-change: filter;
    filter:
      grayscale(calc((1 - var(--bandeet-color)) * 100%))
      contrast(calc(1.42 - var(--bandeet-color) * 0.32))
      brightness(calc(1.06 - var(--bandeet-color) * 0.06))
      saturate(calc(0.75 + var(--bandeet-color) * 0.45));
  }

  @media (prefers-reduced-motion: reduce) {
    .bandeet-img {
      --bandeet-color: 1;
      will-change: auto;
    }
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 28px;
    color: #1a1a1a;
  }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #1a1a1a; }
  .divider span { font-size: 18px; }

  .event-info { text-align: center; margin-bottom: 32px; }
  .event-q {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 24px;
    text-align: center;
    color: #1a1a1a;
    margin-bottom: 12px;
    font-weight: normal;
  }
  .event-q + .event-human { margin-top: 0; }
  .event-q-spaced { margin-top: 28px; }
  .event-human {
    font-family: 'Special Elite', monospace;
    font-size: 16px;
    line-height: 1.75;
    color: #333;
    max-width: 520px;
    margin: 0 auto 18px;
    letter-spacing: 0.5px;
  }
  .event-human strong {
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 1px;
  }
  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: #1a1a1a;
    letter-spacing: 1px;
    text-decoration: none;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 2px;
    transition: opacity 0.15s;
  }
  .map-link:hover { opacity: 0.6; }
  .map-embed {
    margin-top: 14px;
    border: 1px solid #1a1a1a;
    overflow: hidden;
  }
  .map-embed iframe { display: block; width: 100%; height: 220px; border: none; }

  .section { margin-bottom: 36px; }
  .section-title {
    font-family: 'UnifrakturMaguntia', cursive;
    font-size: 26px;
    text-align: center;
    margin-bottom: 16px;
  }

  .counter-bar { margin-top: 0; margin-bottom: 0; text-align: center; }
  .counter-num { font-family: 'Oswald', sans-serif; font-size: 48px; font-weight: 700; line-height: 1; }
  .counter-label {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    margin-top: 12px;
  }

  .guests-list { margin-top: 14px; text-align: center; }

  .rsvp-cta {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid #ccc;
  }
  .guest-pill {
    display: inline-block;
    border: 1px solid #1a1a1a;
    padding: 4px 10px;
    margin: 4px;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .guest-circle { font-size: 10px; color: #777; margin-left: 4px; }

  .attend-btn {
    display: block;
    width: 100%;
    background: #1a1a1a;
    color: #f5f2eb;
    border: none;
    padding: 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .attend-btn:hover { background: #333; }
  .attend-btn:active { transform: scale(0.98); }

  .form-box {
    display: none;
    border: 1px solid #1a1a1a;
    padding: 20px;
    margin-top: 16px;
    background: #fff;
  }
  .form-box.visible { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  .form-label {
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #555;
    display: block;
    margin-bottom: 4px;
    margin-top: 14px;
  }
  .form-label:first-child { margin-top: 0; }
  .form-input, .form-select {
    width: 100%;
    border: 1px solid #1a1a1a;
    background: #f5f2eb;
    padding: 10px 12px;
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    color: #1a1a1a;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
  }

  .submit-btn {
    margin-top: 16px;
    display: block;
    width: 100%;
    background: transparent;
    color: #1a1a1a;
    border: 1px solid #1a1a1a;
    padding: 12px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .submit-btn:hover { background: #1a1a1a; color: #f5f2eb; }

  .error-msg { font-size: 12px; color: #c00; margin-top: 4px; letter-spacing: 1px; }

  .success-msg {
    display: none;
    text-align: center;
    padding: 16px;
    font-family: 'Oswald', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    color: #1a1a1a;
    border: 1px solid #1a1a1a;
    margin-top: 16px;
    background: #fff;
  }
  .success-msg.visible { display: block; animation: fadeIn 0.3s ease; }

  .food-row { display: flex; gap: 16px; }
  .food-card {
    flex: 1;
    border: 1px solid #1a1a1a;
    background: #fff;
    padding: 20px 12px;
    text-align: center;
  }
  .food-icon { font-size: 32px; margin-bottom: 8px; }
  .food-name { font-family: 'Oswald', sans-serif; font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
  .food-sub { font-size: 11px; color: #777; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }

  .footer-txt { text-align: center; font-size: 11px; color: #888; letter-spacing: 2px; text-transform: uppercase; }

  .guests-list-inner { max-height: 180px; overflow-y: auto; padding-right: 4px; }

  .attend-btn:focus-visible,
  .submit-btn:focus-visible,
  .map-link:focus-visible,
  .form-input:focus-visible,
  .form-select:focus-visible {
    outline: 2px solid #1a1a1a;
    outline-offset: 2px;
  }

  @media (max-width: 480px) {
    body { padding: 24px 12px 48px; }
    .event-human { font-size: 14px; }
    .food-row { flex-direction: column; }
  }

  @media (prefers-reduced-motion: reduce) {
    .form-box.visible,
    .success-msg.visible { animation: none; }
    .attend-btn:active { transform: none; }
    .reveal {
      opacity: 1;
      transform: none;
      transition: none;
    }
  }
</style>
</head>

<script>
  const STORAGE_KEY = 'gonza30_guests_v3';

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function loadGuests() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
  }

  function saveGuests(guests) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(guests)); } catch(e) {}
  }

  function renderGuests() {
    const guests = loadGuests();
    const counter = document.getElementById('counterNum');
    const listWrap = document.getElementById('guestsList');
    const list = document.getElementById('guestsListInner');
    counter.textContent = guests.length;
    if (guests.length === 0) { listWrap.style.display = 'none'; return; }
    listWrap.style.display = 'block';
    list.innerHTML = guests.map(function(g) {
      return '<span class="guest-pill">' + escapeHtml(g.name) + '<span class="guest-circle"> · ' + escapeHtml(g.circle) + '</span></span>';
    }).join('');
  }

  function toggleForm() {
    const form = document.getElementById('attendForm');
    const btn = document.getElementById('toggleFormBtn');
    const isVisible = form.classList.contains('visible');
    if (isVisible) {
      form.classList.remove('visible');
      btn.textContent = 'Confirmo asistencia';
    } else {
      form.classList.add('visible');
      btn.textContent = 'Cerrar';
    }
  }

  function submitAttendance() {

    const circleErr = document.getElementById('circleError');
    const successMsg = document.getElementById('successMsg');

    nameErr.style.display = 'none';
    circleErr.style.display = 'none';
    successMsg.classList.remove('visible');

    let valid = true;
    if (!name) { nameErr.style.display = 'block'; valid = false; }
    if (!circle) { circleErr.style.display = 'block'; valid = false; }
    if (!valid) return;

    const guests = loadGuests();
    const already = guests.some(function(g) { return g.name.toLowerCase() === name.toLowerCase(); });
    if (already) {
      successMsg.textContent = name + ' ya confirmó. ¡Nos vemos el 18!';
      successMsg.classList.add('visible');
      return;
    }

    guests.push({ name: name, circle: circle });
    saveGuests(guests);
    renderGuests();

    document.getElementById('nameInput').value = '';
    document.getElementById('circleInput').value = '';
    document.getElementById('attendForm').classList.remove('visible');
    document.getElementById('toggleFormBtn').textContent = 'Confirmo asistencia';

    successMsg.textContent = '¡' + name + ' confirmado/a! Nos vemos el 18 ✦';
    successMsg.classList.add('visible');

    setTimeout(function() { successMsg.classList.remove('visible'); }, 4000);
  }

  renderGuests();

  (function initBandeetScroll() {
    var img = document.getElementById('bandeetImg');
    if (!img) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      img.style.setProperty('--bandeet-color', '1');
      return;
    }
    var startPx = 30;
    var rangePx = 720;
    var raf = null;
    function update() {
      raf = null;
      var y = window.scrollY || document.documentElement.scrollTop;
      var p = (y - startPx) / rangePx;
      if (p < 0) p = 0;
      if (p > 1) p = 1;
      img.style.setProperty('--bandeet-color', p.toFixed(4));
    }
    function onScroll() {
      if (raf) return;
      raf = window.requestAnimationFrame(update);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onScroll, { passive: true });
    update();
  })();

  (function initScrollReveal() {
    var nodes = document.querySelectorAll('.reveal');
    if (!nodes.length) return;
    if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
      nodes.forEach(function(el) { el.classList.add('is-visible'); });
      return;
    }
    if (!('IntersectionObserver' in window)) {
      nodes.forEach(function(el) { el.classList.add('is-visible'); });
      return;
    }
    var io = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('is-visible');
        io.unobserve(entry.target);
      });
    }, { root: null, rootMargin: '0px 0px -6% 0px', threshold: 0.08 });
    nodes.forEach(function(el) { io.observe(el); });
  })();
</script>
